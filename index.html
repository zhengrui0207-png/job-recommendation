                const rankClass = rank <= 2 ? 'gold' : (rank <= 5 ? 'silver' : 'bronze');
                const score = calculateMatchScore(job);

                html += `
                    <div class="job-row">
                        <div class="rank ${rankClass}">${rank}</div>
                        <div>
                            <div class="company-name">${job.company || '未知公司'}</div>
                            <div class="job-title">${job.name || '职位名称'}</div>
                            <div class="company-meta">${job.area || '北京'}</div>
                            <div class="active-badge">今日活跃</div>
                        </div>
                        <div class="salary">${job.salary || '薪资面议'}</div>
                        <div class="job-desc">
                            ${job.skills ? `<span class="highlight">技能：${job.skills}</span><br>` : ''}
                            <span class="highlight">经验：${job.experience || '不限'}</span><br>
                            <span class="highlight">学历：${job.degree || '不限'}</span><br>
                            <span class="highlight">Boss：${job.boss || '未知'}</span>
                        </div>
                        <div class="score">
                            <div class="score-value">${score}</div>
                            <div class="score-bar"><div class="score-bar-fill" style="width:${score}%;"></div></div>
                        </div>
                        <div><a href="${job.url || '#'}" class="action-btn" target="_blank">立即投递</a></div>
                    </div>
                `;
            });

            const updateTime = typeof lastUpdated !== 'undefined' ? lastUpdated : new Date().toLocaleString('zh-CN');
            html += `<div class="job-updated">📅 数据更新时间：${updateTime}</div>`;
            container.innerHTML = html;
            document.getElementById('updateTime').textContent = updateTime;
        }

        function calculateMatchScore(job) {
            let score = 60;
            if (job.name && job.name.toLowerCase().includes('ai')) score += 20;
            if (job.skills && job.skills.toLowerCase().includes('ai')) score += 10;
            const resumeSkills = ['Prompt', 'Agent', 'RAG', 'A/B', 'SQL', '数据分析', '用户增长', '产品经理'];
            if (job.skills) {
                resumeSkills.forEach(skill => {
                    if (job.skills.toLowerCase().includes(skill.toLowerCase())) score += 3;
                });
            }
            return Math.min(score, 100);
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderJobs();
            document.getElementById('targetJob').addEventListener('change', function() {
                currentTargetJob = this.value;
                const tips = optimizationData[currentTargetJob];
                const tipsList = document.getElementById('tipsList');
                if (tips && tips.tips) {
                    tipsList.innerHTML = tips.tips.map(t => `<li>${t}</li>`).join('');
                } else {
                    tipsList.innerHTML = '<li>请先选择目标岗位获取优化建议</li>';
                }
            });
        });

        function startOptimization() {
            if (!currentTargetJob) { alert('请先选择目标岗位'); return; }
            openModal();
        }

        function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('btnExport').style.display = 'inline-block';
            renderResumeEditor();
        }

        function closeModal() {
            if (hasUnsavedChanges && !confirm('有未保存的修改，确定要关闭吗？')) return;
            hasUnsavedChanges = false;
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function getExpOptimizationTips(company) {
            const tips = optimizationData[currentTargetJob];
            if (!tips) return [];
            const companyTips = [];
            if (company.includes('航旅纵横') || company.includes('中航信')) {
                companyTips.push('强调Agent构建和RAG能力', '突出航班助手、延误分析等6+核心功能', '展示回答正确率从58%→87%的成果', '体现10+业务方协调能力');
            } else if (company.includes('携程')) {
                companyTips.push('强调用户增长1500+的成果', '展示ABtest实验优化经验', '突出RFM模型和用户画像标签体系', '体现校园渠道从0到1搭建经验');
            } else if (company.includes('字节') || company.includes('飞书')) {
                companyTips.push('展示企业效能顾问经验', '强调OKR和数据简报制作能力', '突出B端客户活跃留存提升');
            } else if (company.includes('百度')) {
                companyTips.push('强调从0到1建设经验', '突出2w+用户投稿、700万+曝光', '体现垂类创作者生态搭建');
            }
            return companyTips;
        }

        function renderResumeEditor() {
            const tips = optimizationData[currentTargetJob];
            const keywords = tips ? tips.keywords : [];
            const overallTips = tips ? tips.tips : [];
            const editor = document.getElementById('resumeEditor');
            const savedResume = loadSavedResume();
            editedResume = savedResume ? JSON.parse(JSON.stringify(savedResume)) : JSON.parse(JSON.stringify(resumeData));

            let html = `
                <div class="optimization-header">
                    <h4>✨ 针对【${document.getElementById('targetJob').selectedOptions[0].text}】的优化建议</h4>
                    <ul class="overall-tips">${overallTips.map(tip => `<li>${tip}</li>`).join('')}</ul>
                </div>
                <div class="editor-section">
                    <h4>基本信息</h4>
                    <div class="edit-group"><label>姓名：</label><input type="text" id="edit_name" value="${editedResume.name}" onchange="hasUnsavedChanges=true"></div>
                    <div class="edit-group"><label>职位：</label><input type="text" id="edit_title" value="${editedResume.title}" onchange="hasUnsavedChanges=true"></div>
                </div>
                <div class="editor-section">
                    <div class="section-header"><h4>工作经历 <span class="keyword-hint">关键词：${keywords.join(' / ')}</span></h4><button class="btn-add-exp" onclick="addExperience()">➕ 添加工作经历</button></div>
            `;

            editedResume.experience.forEach((exp, i) => {
                const expTips = getExpOptimizationTips(exp.company);
                html += `
                    <div class="exp-editor" id="exp_${i}">
                        <div class="exp-tips-banner"><span class="exp-tips-label">💡 优化建议：</span><span class="exp-tips-content">${expTips.length > 0 ? expTips.join(' | ') : '暂无特定建议'}</span></div>
                        <div class="exp-actions">
                            <button class="btn-move" onclick="moveExperience(${i}, -1)" title="上移" ${i === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="btn-move" onclick="moveExperience(${i}, 1)" title="下移" ${i === editedResume.experience.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="btn-delete" onclick="deleteExperience(${i})">🗑️ 删除</button>
                        </div>
                        <div class="edit-group"><label>公司：</label><input type="text" id="edit_exp_${i}_company" value="${exp.company}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>职位：</label><input type="text" id="edit_exp_${i}_position" value="${exp.position}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>时间：</label><input type="text" id="edit_exp_${i}_time" value="${exp.time}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group">
                            <div class="textarea-toolbar"><label>工作描述：</label><button class="btn-bold" onclick="boldText('edit_exp_${i}_desc')" title="加粗">𝐁</button></div>
                            <textarea id="edit_exp_${i}_desc" rows="6" onchange="hasUnsavedChanges=true">${exp.desc.join('\n')}</textarea>
                        </div>
                    </div>
                `;
            });

            html += `</div><div class="editor-section"><div class="section-header"><h4>项目经历</h4><button class="btn-add-exp" onclick="addProject()">➕ 添加项目</button></div>`;

            editedResume.projects.forEach((proj, i) => {
                html += `
                    <div class="exp-editor" id="proj_${i}">
                        <div class="exp-actions">
                            <button class="btn-move" onclick="moveProject(${i}, -1)" title="上移" ${i === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="btn-move" onclick="moveProject(${i}, 1)" title="下移" ${i === editedResume.projects.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="btn-delete" onclick="deleteProject(${i})">🗑️ 删除</button>
                        </div>
                        <div class="edit-group"><label>项目名称：</label><input type="text" id="edit_proj_${i}_name" value="${proj.name}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>时间：</label><input type="text" id="edit_proj_${i}_time" value="${proj.time}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>职责/角色：</label><input type="text" id="edit_proj_${i}_role" value="${proj.role}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group">
                            <div class="textarea-toolbar"><label>项目描述：</label><button class="btn-bold" onclick="boldText('edit_proj_${i}_desc')" title="加粗">𝐁</button></div>
                            <textarea id="edit_proj_${i}_desc" rows="6" onchange="hasUnsavedChanges=true">${proj.desc.join('\n')}</textarea>
                        </div>
                    </div>
                `;
            });

            html += `</div><div class="editor-section"><h4>核心技能 <span class="keyword-hint">建议添加：${keywords.slice(0, 3).join(', ')}</span></h4><div class="edit-group"><label>技能（逗号分隔）：</label><input type="text" id="edit_skills" value="${editedResume.skills.join(', ')}" onchange="hasUnsavedChanges=true"></div></div>`;
            editor.innerHTML = html;
            hasUnsavedChanges = false;
        }

        function boldText(textareaId) {
            const textarea = document.getElementById(textareaId);
            const start = textarea.selectionStart, end = textarea.selectionEnd;
            const text = textarea.value, selected = text.substring(start, end);
            if (selected) {
                textarea.value = text.substring(0, start) + '**' + selected + '**' + text.substring(end);
                textarea.setSelectionRange(start + 2, start + 2 + selected.length);
            } else {
                textarea.value = text.substring(0, start) + '****' + text.substring(end);
                textarea.setSelectionRange(start + 2, start + 2);
            }
            textarea.focus();
            hasUnsavedChanges = true;
        }

        function deleteExperience(index) { if (!confirm('确定要删除这段工作经历吗？')) return; editedResume.experience.splice(index, 1); hasUnsavedChanges = true; renderResumeEditor(); }
        function moveExperience(index, direction) { const newIndex = index + direction; if (newIndex < 0 || newIndex >= editedResume.experience.length) return; const temp = editedResume.experience[index]; editedResume.experience[index] = editedResume.experience[newIndex]; editedResume.experience[newIndex] = temp; hasUnsavedChanges = true; renderResumeEditor(); }
        function addExperience() { editedResume.experience.push({ company: '新公司名称', time: '2024.01 - 至今', position: '职位名称', desc: ['描述1', '描述2'] }); hasUnsavedChanges = true; renderResumeEditor(); }
        function deleteProject(index) { if (!confirm('确定要删除这个项目吗？')) return; editedResume.projects.splice(index, 1); hasUnsavedChanges = true; renderResumeEditor(); }
        function moveProject(index, direction) { const newIndex = index + direction; if (newIndex < 0 || newIndex >= editedResume.projects.length) return; const temp = editedResume.projects[index]; editedResume.projects[index] = editedResume.projects[newIndex]; editedResume.projects[newIndex] = temp; hasUnsavedChanges = true; renderResumeEditor(); }
        function addProject() { editedResume.projects.push({ name: '新项目名称', time: '2024.01 - 至今', role: '角色/职责', desc: ['描述1', '描述2'] }); hasUnsavedChanges = true; renderResumeEditor(); }

        function saveResume() {
            if (!editedResume) return;
            editedResume.name = document.getElementById('edit_name').value;
            editedResume.title = document.getElementById('edit_title').value;
            editedResume.experience.forEach((exp, i) => { exp.company = document.getElementById(`edit_exp_${i}_company`).value; exp.position = document.getElementById(`edit_exp_${i}_position`).value; exp.time = document.getElementById(`edit_exp_${i}_time`).value; exp.desc = document.getElementById(`edit_exp_${i}_desc`).value.split('\n').filter(d => d.trim()); });
            editedResume.projects.forEach((proj, i) => { proj.name = document.getElementById(`edit_proj_${i}_name`).value; proj.time = document.getElementById(`edit_proj_${i}_time`).value; proj.role = document.getElementById(`edit_proj_${i}_role`).value; proj.desc = document.getElementById(`edit_proj_${i}_desc`).value.split('\n').filter(d => d.trim()); });
            editedResume.skills = document.getElementById('edit_skills').value.split(',').map(s => s.trim()).filter(s => s);
            saveToLocalStorage();
            hasUnsavedChanges = false;
            alert('简历已保存！点击"导出PDF"下载优化后的简历。');
        }

        function exportPDF() {
            if (!editedResume) { alert('请先点击"保存修改"'); return; }
            function toBold(text) { return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }
            const resumeHTML = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>${editedResume.name}_简历</title><style>body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.35;color:#222;padding:20px;}.header{text-align:center;border-bottom:2px solid #2f6a37;padding-bottom:10px;margin-bottom:15px;}.header h1{font-size:22px;letter-spacing:3px;}.contact{font-size:12px;color:#555;}.section-title{background:#f4f4f4;padding:3px 10px;font-weight:bold;font-size:14px;color:#2f6a37;margin:12px 0 8px 0;border-left:4px solid #2f6a37;}.item{margin-bottom:10px;}.item-header{display:flex;justify-content:space-between;font-weight:bold;font-size:13px;margin-bottom:3px;}.item-sub{font-size:12px;color:#444;margin-bottom:4px;font-weight:600;}ul{margin:0;padding-left:16px;font-size:12px;}li{margin-bottom:3px;}.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 15px;font-size:12px;padding:0 10px;}@media print{body{padding:0;}}</style></head><body><div class="header"><h1>${editedResume.name}</h1><div class="contact">电话：${editedResume.phone} | 邮箱：${editedResume.email} | ${editedResume.location} | 211硕 | 2年工作经历</div></div><div class="section-title">教育背景</div>${editedResume.education.map(edu => `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span><strong>${edu.school}</strong> · ${edu.major} · ${edu.degree}</span><span>${edu.time}</span></div>`).join('')}<div class="section-title">核心技能</div><div class="skills-grid">${editedResume.skills.map(s => `<div>• <strong>${s}</strong></div>`).join('')}</div><div class="section-title">工作经历</div>${editedResume.experience.map(exp => `<div class="item"><div class="item-header"><span>${exp.company}</span><span>${exp.time}</span></div><div class="item-sub">${exp.position}</div><ul>${exp.desc.map(d => `<li>${toBold(d)}</li>`).join('')}</ul></div>`).join('')}<div class="section-title">项目经历</div>${editedResume.projects.map(proj => `<div class="item"><div class="item-header"><span>${proj.name}</span><span>${proj.time}</span></div><div class="item-sub">${proj.role}</div><ul>${proj.desc.map(d => `<li>${toBold(d)}</li>`).join('')}</ul></div>`).join('')}</body></html>`;
            const printWindow = window.open('', '_blank');
            if (printWindow) { printWindow.document.write(resumeHTML); printWindow.document.close(); } else { alert('请允许弹出窗口以便导出PDF'); }
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    </script>
</body>
</html>
