<body>

        // 存储当前推荐的职位（用于动态生成优化建议）

        const jobSkillVocabulary = Array.from(new Set([
            ...resumeSkills,
            'AI产品', '产品策略', '需求分析', '商业化', '工作流', '多模态', '数据分析',

            '增长实验', 'AIGC', '自动化', '机器人', '知识库', '交付落地'
        ]));

        function normalizeText(value) {
            return String(value || '').replace(/\s+/g, ' ').trim();
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeRegExp(value) {
            return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function uniqueList(items) {
            return [...new Set(items.filter(Boolean))];
        }

        function splitSkillText(value) {
            return uniqueList(
                normalizeText(value)
                    .split(/[,，、|/；;\n]/)
                    .map(item => item.trim())
                    .filter(item => item && item.length <= 14)
            );
        }

        function getJobScale(job) {
            return normalizeText(job.size || job.scale);
        }

        function getJobFinance(job) {
            return normalizeText(job.finance || job.stage);
        }

        function getJobActiveTime(job) {
            return normalizeText(job.activeTime || job.active_time);
        }

        function getJobLocation(job) {
            const direct = normalizeText(job.area);
            if (direct) return direct;
            return [normalizeText(job.city), normalizeText(job.district)].filter(Boolean).join(' · ');
        }

        function getJobDetailText(job) {
            return normalizeText(job.description || job.jdSummary || '');
        }

        function getJobWelfare(job) {
            return normalizeText(job.welfare);
        }

        function isAiNativeCompany(job) {
            return aiNativeCompanies.some(c => normalizeText(job.company).toLowerCase().includes(c.toLowerCase()));
        }

        function parseCompanyScale(scaleText) {
            const text = normalizeText(scaleText);
            if (!text) return { min: null, max: null, known: false };
            if (text.includes('100人以下')) return { min: 0, max: 99, known: true };

            const rangeMatch = text.match(/(\d+)\s*[-~]\s*(\d+)人/);
            if (rangeMatch) {
                return { min: Number(rangeMatch[1]), max: Number(rangeMatch[2]), known: true };
            }

            const overMatch = text.match(/(\d+)人以上/);
            if (overMatch) {
                const min = Number(overMatch[1]);
                return { min, max: min, known: true };
            }

            return { min: null, max: null, known: false };
        }

        function getExperienceLevel(job) {
            const experience = normalizeText(job.experience).toLowerCase();
            if (!experience) return 'unknown';
            if (experience.includes('在校') || experience.includes('应届')) return 'campus';
            if (experience.includes('经验不限')) return 'open';
            if (experience.includes('1年以内')) return 'under-1';
            if (/3年以上|5年以上|10年以上/.test(experience)) return '3-plus';

            const rangeMatch = experience.match(/(\d+)\s*[-~]\s*(\d+)年/);
            if (rangeMatch) {
                const min = Number(rangeMatch[1]);
                const max = Number(rangeMatch[2]);
                if (max <= 3) return '1-3';
                if (min >= 3 || max > 3) return '3-plus';
            }

            return 'unknown';
        }

        function getHrActivityLevel(job) {
            const activeText = getJobActiveTime(job);
            if (!activeText) return 'unknown';
            if (/刚刚|今日|今天|在线/.test(activeText)) return 'today';
            if (/3天内|三天内|近3日/.test(activeText)) return 'recent';

            const dayMatch = activeText.match(/(\d+)天/);
            if (dayMatch) {
                return Number(dayMatch[1]) <= 3 ? 'recent' : 'stale';
            }

            if (/周前|月前|月内|较久/.test(activeText)) return 'stale';
            if (/本周/.test(activeText)) return 'unknown';
            return 'unknown';
        }

        function getLocationPriorityScore(job) {
            const location = getJobLocation(job);
            if (!location) return 0;
            if (location.includes('北京') && location.includes('朝阳')) return 15;
            if (location.includes('北京')) return 10;
            if (location.includes('杭州')) return 8;
            if (location.includes('上海')) return 5;
            if (location.includes('深圳') || location.includes('广州')) return 3;
            return -10;
        }

        function getFinanceScore(job) {
            const finance = getJobFinance(job);
            if (!finance) return 0;
            if (/已上市|上市|B轮|C轮|D轮|战略融资/.test(finance)) return 10;
            if (/A轮|天使轮/.test(finance)) return -10;
            return 0;
        }

        function parseSalaryRange(salaryText) {
            const salary = normalizeText(salaryText).toUpperCase();
            const rangeMatch = salary.match(/(\d+)\s*-\s*(\d+)\s*K/);
            if (rangeMatch) {
                return { min: Number(rangeMatch[1]), max: Number(rangeMatch[2]) };
            }
            const overMatch = salary.match(/(\d+)\s*K以上/);
            if (overMatch) {
                return { min: Number(overMatch[1]), max: Number(overMatch[1]) + 10 };
            }
            const singleMatch = salary.match(/(\d+)\s*K/);
            if (singleMatch) {
                return { min: Number(singleMatch[1]), max: Number(singleMatch[1]) };
            }
            return { min: 0, max: 0 };
        }

        function extractSkillKeywords(job) {
            const rawSkills = splitSkillText(job.skills);
            const fullText = [
                normalizeText(job.name),
                normalizeText(job.skills),
                getJobDetailText(job),
                getJobWelfare(job),
                normalizeText(job.industry)
            ].join(' ').toLowerCase();

            const matchedKeywords = jobSkillVocabulary.filter(keyword => fullText.includes(keyword.toLowerCase()));
            return uniqueList([...rawSkills, ...matchedKeywords]).slice(0, 6);
        }

        function getResumeSkillHits(skillKeywords) {
            return skillKeywords.filter(keyword =>
                resumeSkills.some(skill =>
                    skill.toLowerCase().includes(keyword.toLowerCase()) ||
                    keyword.toLowerCase().includes(skill.toLowerCase())
                )
            );
        }

        function buildJobSummary(job, skillKeywords) {
            const detailText = getJobDetailText(job);
            let summary = '';

            if (detailText.length >= 80) {
                const sentences = detailText
                    .split(/[。；;！!?]/)
                    .map(sentence => normalizeText(sentence))
                    .filter(sentence => sentence.length >= 10);
                summary = sentences.slice(0, 3).join('。');
                if (summary && !summary.endsWith('。')) summary += '。';
            }

            if (summary.length < 100) {
                const fallbackParts = [
                    `${normalizeText(job.company) || '该公司'}发布的${normalizeText(job.name) || '该岗位'}，当前薪资区间为${normalizeText(job.salary) || '面议'}，工作地点在${getJobLocation(job) || '目标城市'}。`,
                    `岗位更看重${skillKeywords.length ? skillKeywords.join('、') : (normalizeText(job.skills) || '产品策略、需求分析、跨团队协作')}等能力，通常会考察候选人对业务场景的理解、数据判断和项目推动能力。`,
                    `${normalizeText(job.experience) ? `经验要求偏向${normalizeText(job.experience)}` : '经验要求仍需补全'}${normalizeText(job.degree) ? `，学历要求为${normalizeText(job.degree)}` : ''}。${getJobScale(job) ? `公司规模约${getJobScale(job)}` : '当前公司规模字段缺失'}${getJobFinance(job) ? `，发展阶段为${getJobFinance(job)}` : ''}。`
                ];
                summary = fallbackParts.join('');
            }

            if (summary.length < 110) {
                summary += ' 目前这条职位还缺少完整 JD 原文，建议先登录 Boss 后重新抓取详情，这样才能补齐职责描述、技能栈、业务目标和福利信息，匹配度也会更稳定。';
            }

            return summary;
        }

        function highlightKeywords(text, skillKeywords) {
            let highlighted = escapeHtml(text);
            skillKeywords.slice(0, 6).forEach(keyword => {
                const pattern = new RegExp(escapeRegExp(keyword), 'gi');
                highlighted = highlighted.replace(pattern, match => `<span class="summary-mark">${match}</span>`);
            });
            return highlighted;
        }

        function buildJobHighlights(job, skillKeywords) {
            const detailText = getJobDetailText(job);
            const highlightRows = [];

            if (skillKeywords.length) {
                highlightRows.push(`技能重点：${skillKeywords.slice(0, 4).join(' / ')}`);
            }

            if (normalizeText(job.skills)) {
                highlightRows.push(`原始关键词：${normalizeText(job.skills)}`);
            }

            const detailSentences = detailText
                .split(/[。；;！!?]/)
                .map(sentence => normalizeText(sentence))
                .filter(sentence =>
                    sentence.length >= 12 &&
                    /负责|要求|熟悉|经验|能力|策略|分析|产品|增长|协同|落地/.test(sentence)
                );

            detailSentences.slice(0, 2).forEach(sentence => highlightRows.push(sentence));

            if (highlightRows.length < 3) {
                highlightRows.push(`硬性条件：${normalizeText(job.experience) || '经验待补充'} · ${normalizeText(job.degree) || '学历不限'} · ${getJobLocation(job) || '城市待补充'}`);
            }

            if (highlightRows.length < 4 && getJobWelfare(job)) {
                highlightRows.push(`福利亮点：${getJobWelfare(job)}`);
            }

            return uniqueList(highlightRows).slice(0, 4);
        }

        function getJobRiskTags(job) {
            const title = normalizeText(job.name).toLowerCase();
            const experience = normalizeText(job.experience).toLowerCase();
            const riskTags = [];
            const scaleMeta = parseCompanyScale(getJobScale(job));
            const hrActivityLevel = getHrActivityLevel(job);

            if (title.includes('实习')) riskTags.push('实习岗');
            if (title.includes('校招') || experience.includes('在校') || experience.includes('应届')) riskTags.push('校招/应届');
            if (title.includes('外派')) riskTags.push('外派风险');
            if (normalizeText(job.degree).includes('博士')) riskTags.push('博士门槛');
            if (scaleMeta.known && scaleMeta.max < 100) riskTags.push('公司规模偏小');
            if (hrActivityLevel === 'stale') riskTags.push('HR活跃度偏低');

            return riskTags;
        }

        function isSocialHireJob(job) {
            const title = normalizeText(job.name).toLowerCase();
            const degree = normalizeText(job.degree);
            const experienceLevel = getExperienceLevel(job);
            const scaleMeta = parseCompanyScale(getJobScale(job));
            const hrActivityLevel = getHrActivityLevel(job);

            if (title.includes('校招') || title.includes('应届') || title.includes('实习') || title.includes('管培') || title.includes('外派')) return false;
            if (degree.includes('博士')) return false;
            if (experienceLevel === 'campus' || experienceLevel === '3-plus') return false;
            if (scaleMeta.known && scaleMeta.max < 100) return false;
            if (hrActivityLevel === 'stale') return false;

            return true;
        }

        function buildJobTags(job, skillKeywords, showActiveTag) {
            const tags = [];
            const resumeSkillHits = getResumeSkillHits(skillKeywords);

            if (isAiNativeCompany(job)) tags.push({ tone: 'ai', text: 'AI Native' });
            if (getJobScale(job)) tags.push({ tone: 'size', text: getJobScale(job) });
            if (getJobFinance(job)) tags.push({ tone: 'finance', text: getJobFinance(job) });
            if (showActiveTag && getJobActiveTime(job)) tags.push({ tone: 'active', text: `HR ${getJobActiveTime(job)}` });
            if (resumeSkillHits.length) tags.push({ tone: 'match', text: `技能匹配 ${resumeSkillHits.length} 项` });
            getJobRiskTags(job).forEach(tag => tags.push({ tone: 'risk', text: tag }));

            return tags.slice(0, 6);
        }

        function calculateMatchScore(job, skillKeywords) {
            const title = normalizeText(job.name).toLowerCase();
            const salary = parseSalaryRange(job.salary);
            const resumeHits = getResumeSkillHits(skillKeywords);
            const scaleMeta = parseCompanyScale(getJobScale(job));
            const experienceLevel = getExperienceLevel(job);
            const hrActivityLevel = getHrActivityLevel(job);
            let rawScore = 0;

            if (hrActivityLevel === 'today' || hrActivityLevel === 'recent') rawScore += 15;
            rawScore += getLocationPriorityScore(job);

            if (scaleMeta.known && scaleMeta.min >= 1000) rawScore += 10;
            rawScore += getFinanceScore(job);

            if (isAiNativeCompany(job)) rawScore += 20;
            if (title.includes('ai') || title.includes('人工智能') || title.includes('大模型') || title.includes('llm')) rawScore += 20;
            if (title.includes('产品经理')) rawScore += 15;
            if (title.includes('策略') || title.includes('增长')) rawScore += 10;
            if (title.includes('运营')) rawScore += 8;

            rawScore += Math.min(30, resumeHits.length * 5);

            if (salary.min >= 15) rawScore += 5;
            if (experienceLevel === '1-3') rawScore += 5;

            const score = Math.max(40, Math.min(98, Math.round(45 + rawScore * 0.45)));
            const label = score >= 88 ? '强推荐' : (score >= 78 ? '优先投递' : (score >= 68 ? '值得关注' : '可作补充'));

            return {
                score,
                label,
                rawScore,
                resumeHits
            };
        }

        function normalizeJob(job, index) {
            const skillKeywords = extractSkillKeywords(job);
            const scoreMeta = calculateMatchScore(job, skillKeywords);
            return {
                ...job,
                skillKeywords,
                resumeSkillHits: scoreMeta.resumeHits,
                jdSummary: buildJobSummary(job, skillKeywords),
                highlightRows: buildJobHighlights(job, skillKeywords),
                riskTags: getJobRiskTags(job),
                _score: scoreMeta.score,
                _scoreMeta: scoreMeta,
                _hasDetail: getJobDetailText(job).length >= 80,
                _originalIndex: index
            };
        }

            const saved = localStorage.getItem('editedResume_' + currentTargetJob);

        // 动态渲染职位列表
        function renderJobs() {
            const container = document.getElementById('jobListContainer');
            if (!container) return;
            const currentJobs = getCurrentJobs();

            if (!currentJobs || currentJobs.length === 0) {
                container.innerHTML = '<div class="job-loading">正在尝试恢复职位数据...</div>';
                loadJobsFallback();
                return;
            }

            const normalizedJobs = currentJobs
                .map((job, index) => normalizeJob(job, index))
                .sort((a, b) => b._score - a._score);

            const eligibleJobs = normalizedJobs.filter(isSocialHireJob);
            const visibleJobs = eligibleJobs.length <= 20 ? eligibleJobs : eligibleJobs.slice(0, 20);
            const activeValues = uniqueList(visibleJobs.map(job => getJobActiveTime(job)));
            const showActiveTag = activeValues.length > 1;

            if (!visibleJobs.length) {
                container.innerHTML = `<div class="empty-state">当前抓取结果里，没有同时满足“社招、HR 活跃、公司规模不低于 100 人、经验不高于 3 年、非外派/非应届/非实习”的岗位。我没有把不符合条件的职位硬塞进列表；后续只要继续补抓更准确的数据，这里会优先展示真正可投的岗位。</div>`;
                document.getElementById('updateTime').textContent = getCurrentLastUpdated();
                return;
            }

            visibleJobs.forEach(job => {
                job.tags = buildJobTags(job, job.skillKeywords, showActiveTag);
            });

            let html = '';

            visibleJobs.forEach((job, index) => {
                const scoreMeta = job._scoreMeta;
                const tagHtml = job.tags.map(tag => `<span class="job-tag ${tag.tone}">${escapeHtml(tag.text)}</span>`).join('');
                const highlightHtml = job.highlightRows.map(row => `<div class="highlight-row">${highlightKeywords(row, job.skillKeywords)}</div>`).join('');
                const summaryHtml = highlightKeywords(job.jdSummary, job.skillKeywords);
                const rankClass = index < 3 ? 'top-3' : (index < 10 ? 'top-10' : '');
                const bossMeta = [normalizeText(job.boss), normalizeText(job.bossTitle || job.boss_title)].filter(Boolean).join(' · ');

                html += `
                    <article class="job-card">
                        <div class="job-card-main">
                            <div class="job-card-top">
                                <div class="rank-chip ${rankClass}">#${index + 1}</div>
                                <div>
                                    <div class="company-line">
                                        <div class="company-name">${escapeHtml(normalizeText(job.company) || '未知公司')}</div>
                                    </div>
                                    <h3 class="job-title">${escapeHtml(normalizeText(job.name) || '职位名称')}</h3>
                                    <div class="job-meta-line">
                                        <span class="meta-pill">📍 ${escapeHtml(getJobLocation(job) || '城市待补充')}</span>
                                        <span class="meta-pill">👤 ${escapeHtml(bossMeta || 'Boss 信息待补充')}</span>
                                        <span class="meta-pill">🎓 ${escapeHtml(normalizeText(job.experience) || '经验不限')} · ${escapeHtml(normalizeText(job.degree) || '学历不限')}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="job-tags">${tagHtml}</div>
                            <div class="job-summary">${summaryHtml}</div>
                            <div class="job-highlights">${highlightHtml}</div>
                        </div>
                        <aside class="job-card-side">
                            <div class="job-side-panel">
                                <div class="salary-main">${escapeHtml(normalizeText(job.salary) || '薪资面议')}</div>
                            </div>
                            <div class="job-side-panel">
                                <div class="score-panel">
                                    <div>
                                        <div class="score-value">${scoreMeta.score}</div>
                                        <div class="score-label">${escapeHtml(scoreMeta.label)}</div>
                                    </div>
                                </div>
                                <div class="score-bar"><div class="score-bar-fill" style="width:${scoreMeta.score}%;"></div></div>
                            </div>
                            <div class="job-side-panel">
                                <div class="detail-list">
                                    <div><strong>技能命中：</strong>${escapeHtml(job.resumeSkillHits.join('、') || '待补充')}</div>
                                    <div><strong>公司规模：</strong>${escapeHtml(getJobScale(job) || '待补充')}</div>
                                    <div><strong>融资阶段：</strong>${escapeHtml(getJobFinance(job) || '待补充')}</div>
                                </div>
                            </div>
                            <div><a href="${job.url || '#'}" class="action-btn" target="_blank">查看原始岗位</a></div>
                        </aside>
                    </article>
                `;
            });

            const updateTime = getCurrentLastUpdated();
            html += `<div class="job-updated">数据更新时间：${updateTime} ｜ 当前展示符合规则岗位 ${visibleJobs.length} 个</div>`;
            container.innerHTML = html;
            document.getElementById('updateTime').textContent = updateTime;

            // 动态填充目标岗位下拉框和可点击列表
            const targetJobSelect = document.getElementById('targetJob');
            const selectorListContent = document.getElementById('selectorListContent');
            targetJobSelect.innerHTML = '<option value="">-- 从推荐职位中选择 --</option>';
            selectorListContent.innerHTML = '';
            visibleJobs.forEach((job, index) => {
                // 填充下拉框
                const option = document.createElement('option');
                option.value = job._originalIndex;
                option.textContent = `${job.company} - ${job.name}（${job._scoreMeta.label} ${job._score}分）`;
                targetJobSelect.appendChild(option);

                // 填充可点击列表
                const btn = document.createElement('button');
                btn.className = 'job-select-btn';
                btn.dataset.index = job._originalIndex;
                btn.innerHTML = `${job.company} - ${job.name} <span class="job-score">${job._scoreMeta.label} · ${job._score}分</span>`;
                btn.onclick = function() {
                    selectJob(job._originalIndex);
                };
                selectorListContent.appendChild(btn);
            });
            recommendedJobs = visibleJobs;
        }

        // 选择岗位
        function selectJob(index) {
            if (Number.isNaN(index)) return;
            currentTargetJob = index.toString();
            const currentJobs = getCurrentJobs();
            // 更新下拉框
            document.getElementById('targetJob').value = index.toString();
            // 更新按钮选中状态
            document.querySelectorAll('.job-select-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.index === index.toString()) {
                    btn.classList.add('selected');
                }
            });
            // 更新AI建议
            const job = currentJobs[parseInt(index)];
            const tips = generateOptimizationTips(job);
            const tipsList = document.getElementById('tipsList');
            tipsList.innerHTML = tips.map(t => `<li>${t}</li>`).join('');
        }

        // AI Native 公司列表
        const aiNativeCompanies = [
            'minimax', '智谱', 'kimi', '月之暗面', 'moonshot', 'deepseek',
            '百川', '零一万物', '阶跃星辰', '面壁智能', '稀宇科技', 'MiniMax',
            'Zhipu', 'Moonshot', 'DeepSeek', 'Baichuan'
        ];

        document.addEventListener('DOMContentLoaded', function() {
            renderJobs();
            document.getElementById('targetJob').addEventListener('change', function() {
                if (!this.value) return;
                selectJob(parseInt(this.value, 10));
            });
        });

        // 根据职位要求生成AI优化建议
        function generateOptimizationTips(job) {
            if (!job) {
                return ['请先选择目标岗位，系统会根据岗位关键词和 JD 摘要生成更细的简历优化建议。'];
            }

            const normalizedJob = normalizeJob(job, 0);
            const tips = [];
            const jobName = normalizeText(job.name).toLowerCase();
            const skillKeywords = normalizedJob.skillKeywords;
            const resumeHits = getResumeSkillHits(skillKeywords);

            if (resumeHits.length) {
                tips.push(`把 ${resumeHits.slice(0, 3).join('、')} 放进简历标题或首屏技能区，先和岗位技能标签对齐。`);
            }

            if (skillKeywords.length) {
                tips.push(`工作经历里优先补充 ${skillKeywords.slice(0, 4).join('、')} 相关案例，最好每条都带结果数据或业务影响。`);
            }

            if (jobName.includes('ai') || jobName.includes('产品')) {
                tips.push('重点突出 AI Agent、Prompt 调优、需求拆解和跨团队推进这几类能力，不要只写通用运营动作。');
            }

            if (jobName.includes('策略') || jobName.includes('增长') || jobName.includes('运营')) {
                tips.push('把 A/B 实验、用户分层、策略优化、增长结果写成“动作 + 指标提升”的句式，能明显提升岗位说服力。');
            }

            if (parseSalaryRange(job.salary).min >= 20) {
                tips.push('这类薪资带通常更看重业务结果，建议把点击率、转化率、正确率、效率提升这类数字往前放。');
            }

            if (!normalizedJob._hasDetail) {
                tips.push('当前岗位还没抓到完整 JD，建议登录 Boss 后重新抓取一次，这样技能要求和职责边界会更清楚。');
            }

            if ((job.degree || '').includes('本科')) {
                tips.push('教育背景里继续保留北邮硕士和 211 标签，这类岗位通常默认把学历当成第一轮筛选条件。');
            }

            if (tips.length < 4) {
                tips.push('把“日均流量 10w+、回答正确率 58→87%、点击率提升”等结果型表述前置，减少空泛职责描述。');
            }

            return uniqueList(tips).slice(0, 5);
        }

        function startOptimization() {
            if (!currentTargetJob) { alert('请先选择目标岗位'); return; }
            openModal();
        }

        function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('btnExport').style.display = 'inline-block';
            renderResumeEditor();
        }

        function closeModal() {
            if (hasUnsavedChanges && !confirm('有未保存的修改，确定要关闭吗？')) return;
            hasUnsavedChanges = false;
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function getJobBasedTips() {
            if (!currentTargetJob) return [];
            const job = getCurrentJobs()[parseInt(currentTargetJob)];
            return generateOptimizationTips(job);
        }

        function getExpOptimizationTips(company) {
            const jobTips = getJobBasedTips();
            if (!jobTips || jobTips.length === 0) return [];
            const companyTips = [];
            if (company.includes('航旅纵横') || company.includes('中航信')) {
                companyTips.push('突出Agent构建和RAG能力');
                companyTips.push('展示回答正确率58→87%的成果');
            } else if (company.includes('携程')) {
                companyTips.push('强调用户增长1500+成果');
                companyTips.push('展示A/B实验优化经验');
            } else if (company.includes('字节') || company.includes('飞书')) {
                companyTips.push('展示企业效能顾问经验');
                companyTips.push('突出B端客户活跃留存提升');
            } else if (company.includes('百度')) {
                companyTips.push('强调从0到1建设经验');
                companyTips.push('突出2w+用户投稿、700万+曝光');
            }
            const genericTips = jobTips.filter(t => t.includes('日均流量') || t.includes('SQL') || t.includes('跨团队'));
            return [...companyTips, ...genericTips].slice(0, 4);
        }

        function renderResumeEditor() {
            const jobTips = getJobBasedTips();
            const currentJobs = getCurrentJobs();
            const selectedJob = currentTargetJob ? currentJobs[parseInt(currentTargetJob)] : null;
            const editor = document.getElementById('resumeEditor');
            const savedResume = loadSavedResume();
            editedResume = savedResume ? JSON.parse(JSON.stringify(savedResume)) : JSON.parse(JSON.stringify(resumeData));

            let html = `
                <div class="optimization-header">
                    <h4>✨ 针对【${selectedJob ? selectedJob.company + ' - ' + selectedJob.name : '所选岗位'}】的优化建议</h4>
                    <ul class="overall-tips">${jobTips && jobTips.length > 0 ? jobTips.map(tip => `<li>${tip}</li>`).join('') : '<li>请先选择目标岗位，系统将生成优化建议</li>'}</ul>
                </div>
                <div class="editor-section">
                    <h4>基本信息</h4>
                    <div class="edit-group"><label>姓名：</label><input type="text" id="edit_name" value="${editedResume.name}" onchange="hasUnsavedChanges=true"></div>
                    <div class="edit-group"><label>职位：</label><input type="text" id="edit_title" value="${editedResume.title}" onchange="hasUnsavedChanges=true"></div>
                </div>
                <div class="editor-section">
                    <div class="section-header"><h4>工作经历 <span class="keyword-hint">💡 重点突出：${selectedJob ? (selectedJob.skills || selectedJob.name) : 'AI产品能力'}</span></h4><button class="btn-add-exp" onclick="addExperience()">➕ 添加工作经历</button></div>
            `;

            editedResume.experience.forEach((exp, i) => {
                const expTips = getExpOptimizationTips(exp.company);
                html += `
                    <div class="exp-editor" id="exp_${i}">
                        <div class="exp-tips-banner"><span class="exp-tips-label">💡 优化建议：</span><span class="exp-tips-content">${expTips && expTips.length > 0 ? expTips.join(' | ') : '暂无特定建议'}</span></div>
                        <div class="exp-actions">
                            <button class="btn-move" onclick="moveExperience(${i}, -1)" title="上移" ${i === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="btn-move" onclick="moveExperience(${i}, 1)" title="下移" ${i === editedResume.experience.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="btn-delete" onclick="deleteExperience(${i})">🗑️ 删除</button>
                        </div>
                        <div class="edit-group"><label>公司：</label><input type="text" id="edit_exp_${i}_company" value="${exp.company}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>职位：</label><input type="text" id="edit_exp_${i}_position" value="${exp.position}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>时间：</label><input type="text" id="edit_exp_${i}_time" value="${exp.time}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group">
                            <div class="textarea-toolbar"><label>工作描述：</label><button class="btn-bold" onclick="boldText('edit_exp_${i}_desc')" title="加粗">𝐁</button></div>
                            <textarea id="edit_exp_${i}_desc" rows="6" onchange="hasUnsavedChanges=true">${exp.desc.join('\n')}</textarea>
                        </div>
                    </div>
                `;
            });

            html += `</div><div class="editor-section"><div class="section-header"><h4>项目经历</h4><button class="btn-add-exp" onclick="addProject()">➕ 添加项目</button></div>`;

            editedResume.projects.forEach((proj, i) => {
                html += `
                    <div class="exp-editor" id="proj_${i}">
                        <div class="exp-actions">
                            <button class="btn-move" onclick="moveProject(${i}, -1)" title="上移" ${i === 0 ? 'disabled' : ''}>⬆️</button>
                            <button class="btn-move" onclick="moveProject(${i}, 1)" title="下移" ${i === editedResume.projects.length - 1 ? 'disabled' : ''}>⬇️</button>
                            <button class="btn-delete" onclick="deleteProject(${i})">🗑️ 删除</button>
                        </div>
                        <div class="edit-group"><label>项目名称：</label><input type="text" id="edit_proj_${i}_name" value="${proj.name}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>时间：</label><input type="text" id="edit_proj_${i}_time" value="${proj.time}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group"><label>职责/角色：</label><input type="text" id="edit_proj_${i}_role" value="${proj.role}" onchange="hasUnsavedChanges=true"></div>
                        <div class="edit-group">
                            <div class="textarea-toolbar"><label>项目描述：</label><button class="btn-bold" onclick="boldText('edit_proj_${i}_desc')" title="加粗">𝐁</button></div>
                            <textarea id="edit_proj_${i}_desc" rows="6" onchange="hasUnsavedChanges=true">${proj.desc.join('\n')}</textarea>
                        </div>
                    </div>
                `;
            });

            html += `</div><div class="editor-section"><h4>核心技能 <span class="keyword-hint">建议添加：${selectedJob ? (selectedJob.skills || 'AI产品经理, 数据分析') : 'AI产品经理, 数据分析'}</span></h4><div class="edit-group"><label>技能（逗号分隔）：</label><input type="text" id="edit_skills" value="${editedResume.skills.join(', ')}" onchange="hasUnsavedChanges=true"></div></div>`;
            editor.innerHTML = html;
            hasUnsavedChanges = false;
        }

        function boldText(textareaId) {
            const textarea = document.getElementById(textareaId);
            const start = textarea.selectionStart, end = textarea.selectionEnd;
            const text = textarea.value, selected = text.substring(start, end);
            if (selected) {
                textarea.value = text.substring(0, start) + '**' + selected + '**' + text.substring(end);
                textarea.setSelectionRange(start + 2, start + 2 + selected.length);
            } else {
                textarea.value = text.substring(0, start) + '****' + text.substring(end);
                textarea.setSelectionRange(start + 2, start + 2);
            }
            textarea.focus();
            hasUnsavedChanges = true;
        }

        function deleteExperience(index) { if (!confirm('确定要删除这段工作经历吗？')) return; editedResume.experience.splice(index, 1); hasUnsavedChanges = true; renderResumeEditor(); }
        function moveExperience(index, direction) { const newIndex = index + direction; if (newIndex < 0 || newIndex >= editedResume.experience.length) return; const temp = editedResume.experience[index]; editedResume.experience[index] = editedResume.experience[newIndex]; editedResume.experience[newIndex] = temp; hasUnsavedChanges = true; renderResumeEditor(); }
        function addExperience() { editedResume.experience.push({ company: '新公司名称', time: '2024.01 - 至今', position: '职位名称', desc: ['描述1', '描述2'] }); hasUnsavedChanges = true; renderResumeEditor(); }
        function deleteProject(index) { if (!confirm('确定要删除这个项目吗？')) return; editedResume.projects.splice(index, 1); hasUnsavedChanges = true; renderResumeEditor(); }
        function moveProject(index, direction) { const newIndex = index + direction; if (newIndex < 0 || newIndex >= editedResume.projects.length) return; const temp = editedResume.projects[index]; editedResume.projects[index] = editedResume.projects[newIndex]; editedResume.projects[newIndex] = temp; hasUnsavedChanges = true; renderResumeEditor(); }
        function addProject() { editedResume.projects.push({ name: '新项目名称', time: '2024.01 - 至今', role: '角色/职责', desc: ['描述1', '描述2'] }); hasUnsavedChanges = true; renderResumeEditor(); }

        function saveResume() {
            if (!editedResume) return;
            editedResume.name = document.getElementById('edit_name').value;
            editedResume.title = document.getElementById('edit_title').value;
            editedResume.experience.forEach((exp, i) => { exp.company = document.getElementById(`edit_exp_${i}_company`).value; exp.position = document.getElementById(`edit_exp_${i}_position`).value; exp.time = document.getElementById(`edit_exp_${i}_time`).value; exp.desc = document.getElementById(`edit_exp_${i}_desc`).value.split('\n').filter(d => d.trim()); });
            editedResume.projects.forEach((proj, i) => { proj.name = document.getElementById(`edit_proj_${i}_name`).value; proj.time = document.getElementById(`edit_proj_${i}_time`).value; proj.role = document.getElementById(`edit_proj_${i}_role`).value; proj.desc = document.getElementById(`edit_proj_${i}_desc`).value.split('\n').filter(d => d.trim()); });
            editedResume.skills = document.getElementById('edit_skills').value.split(',').map(s => s.trim()).filter(s => s);
            saveToLocalStorage();
            hasUnsavedChanges = false;
            alert('简历已保存！点击"导出PDF"下载优化后的简历。');
        }

        function exportPDF() {
            if (!editedResume) { alert('请先点击"保存修改"'); return; }
            function toBold(text) { return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }
            const resumeHTML = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>${editedResume.name}_简历</title><style>body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.35;color:#222;padding:20px;}.header{text-align:center;border-bottom:2px solid #2f6a37;padding-bottom:10px;margin-bottom:15px;}.header h1{font-size:22px;letter-spacing:3px;}.contact{font-size:12px;color:#555;}.section-title{background:#f4f4f4;padding:3px 10px;font-weight:bold;font-size:14px;color:#2f6a37;margin:12px 0 8px 0;border-left:4px solid #2f6a37;}.item{margin-bottom:10px;}.item-header{display:flex;justify-content:space-between;font-weight:bold;font-size:13px;margin-bottom:3px;}.item-sub{font-size:12px;color:#444;margin-bottom:4px;font-weight:600;}ul{margin:0;padding-left:16px;font-size:12px;}li{margin-bottom:3px;}.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 15px;font-size:12px;padding:0 10px;}@media print{body{padding:0;}}</style></head><body><div class="header"><h1>${editedResume.name}</h1><div class="contact">电话：${editedResume.phone} | 邮箱：${editedResume.email} | ${editedResume.location} | 211硕 | 2年工作经历</div></div><div class="section-title">教育背景</div>${editedResume.education.map(edu => `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span><strong>${edu.school}</strong> · ${edu.major} · ${edu.degree}</span><span>${edu.time}</span></div>`).join('')}<div class="section-title">核心技能</div><div class="skills-grid">${editedResume.skills.map(s => `<div>• <strong>${s}</strong></div>`).join('')}</div><div class="section-title">工作经历</div>${editedResume.experience.map(exp => `<div class="item"><div class="item-header"><span>${exp.company}</span><span>${exp.time}</span></div><div class="item-sub">${exp.position}</div><ul>${exp.desc.map(d => `<li>${toBold(d)}</li>`).join('')}</ul></div>`).join('')}<div class="section-title">项目经历</div>${editedResume.projects.map(proj => `<div class="item"><div class="item-header"><span>${proj.name}</span><span>${proj.time}</span></div><div class="item-sub">${proj.role}</div><ul>${proj.desc.map(d => `<li>${toBold(d)}</li>`).join('')}</ul></div>`).join('')}</body></html>`;
            const printWindow = window.open('', '_blank');
            if (printWindow) { printWindow.document.write(resumeHTML); printWindow.document.close(); } else { alert('请允许弹出窗口以便导出PDF'); }
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    </script>
</body>
</html>
